name: Structural CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  structural:
    name: Validate repository structure and documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check canonical files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "README.md"
            "AGENTS.md"
            ".codex/config.toml"
            "docs/README.md"
            "docs/project/README.md"
            "docs/project/PROJECT_STATUS.md"
            "docs/project/MODELO_OPERACIONAL_DO_PROJETO.md"
            "docs/project/ROADMAP.md"
            "docs/product/README.md"
            "docs/product/PRODUCT_NORTH_STAR.md"
            "docs/product/PILOT_VERTICAL_SLICE.md"
            "docs/product/USER_JOURNEYS_AND_UX.md"
            "docs/product/PRODUCT_DELIVERY_AND_ACCEPTANCE.md"
            "docs/operations/README.md"
            "docs/operations/ESTRATEGIA_GIT.md"
            "docs/operations/FLUXO_GITHUB_PROJECT.md"
            "docs/operations/FLUXO_VSCODE_GIT_GITHUB_CLI.md"
            "docs/operations/AMBIENTES.md"
            "docs/operations/WSL_MULTI_PROJETOS.md"
            "docs/architecture/README.md"
            "docs/architecture/ARCHITECTURE.md"
            "docs/architecture/DOCUMENT_PIPELINE.md"
            "docs/architecture/PROVIDER_STRATEGY.md"
            "docs/architecture/DATA_MODEL_BASELINE.md"
            "docs/architecture/GLOSSARIO_DOCUMENTAL.md"
            "docs/architecture/PROCESSING_PROFILE_CONTRACT.md"
            "docs/architecture/DATA_SCIENCE_ENGINEERING_LIFECYCLE.md"
            "docs/architecture/STRUCTURED_IMPORT_PIPELINE.md"
            "docs/architecture/MANAGERIAL_FINANCIAL_DOMAIN.md"
            "docs/architecture/EVIDENCE_TO_REPORT_LINEAGE.md"
            "docs/architecture/ACCOUNTING_CLOSE_AND_DELIVERY.md"
            "docs/reviews/GESTAO_DOCUMENTAL_INTELIGENTE.md"
            "docs/templates/epic.md"
            "docs/templates/issue-slice.md"
            "docs/templates/sub-issue.md"
            "docs/templates/pr.md"
            "docs/adr/README.md"
            "docs/adr/0001-on-prem-first-cloud-like.md"
            "docs/adr/0002-phase-0-before-product-code.md"
            "docs/adr/0003-git-flow-issue-branch-pr-review.md"
            "docs/adr/0004-local-dev-windows-wsl-vscode.md"
            "docs/adr/0005-controlled-codex-usage.md"
            "docs/adr/0006-adr-and-traceability-governance.md"
            "docs/adr/0007-structural-ci-and-branch-protection.md"
            "docs/adr/0008-docker-compose-for-local-and-onprem-lab.md"
            "docs/adr/0009-modular-monolith-initial-architecture.md"
            "docs/adr/0010-postgresql-primary-relational-database.md"
            "docs/adr/0011-s3-compatible-object-storage-minio.md"
            "docs/adr/0012-document-envelope-ged-core.md"
            "docs/adr/0013-human-review-acceptance-and-override.md"
            "docs/adr/0014-backup-and-restore-required.md"
            "docs/adr/0015-auth-authorization-security-strategy.md"
            "docs/adr/0016-capability-based-document-processing-providers.md"
            "docs/adr/0017-codex-continuous-slice-loop.md"
            "docs/adr/0018-codex-envelope-lifecycle-and-outcomes.md"
            "docs/traceability/README.md"
            "docs/traceability/adr-index.md"
            "docs/traceability/decision-map.md"
            "docs/traceability/document-map.md"
            "docs/traceability/impact-matrix.md"
            "docs/traceability/module-map.md"
            "docs/traceability/entity-map.md"
            "docs/traceability/route-map.md"
            "docs/uml/README.md"
          )

          missing=0
          for path in "${required_files[@]}"; do
            if [[ ! -f "$path" ]]; then
              echo "::error file=$path::Required canonical file is missing"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Validate documentation links and catalogs
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path
          import re
          import sys
          from urllib.parse import unquote

          root = Path.cwd()
          errors: list[str] = []
          markdown_files = sorted(
              path for path in root.rglob("*.md")
              if ".git" not in path.parts
          )

          link_pattern = re.compile(r"(?<!!)\[[^\]]*\]\(([^)]+)\)")

          for path in markdown_files:
              text = path.read_text(encoding="utf-8")

              fences = sum(1 for line in text.splitlines() if line.lstrip().startswith("```"))
              if fences % 2:
                  errors.append(f"{path.relative_to(root)}: unbalanced Markdown fences")

              for raw_target in link_pattern.findall(text):
                  target = raw_target.strip().split(maxsplit=1)[0].strip("<>")
                  if not target or target.startswith(("#", "http://", "https://", "mailto:")):
                      continue

                  target = unquote(target.split("#", 1)[0].split("?", 1)[0])
                  if not target:
                      continue

                  resolved = (path.parent / target).resolve()
                  try:
                      resolved.relative_to(root)
                  except ValueError:
                      errors.append(
                          f"{path.relative_to(root)}: relative link escapes repository: {raw_target}"
                      )
                      continue

                  if not resolved.exists():
                      errors.append(
                          f"{path.relative_to(root)}: missing relative target: {raw_target}"
                      )

          adr_files = sorted((root / "docs/adr").glob("[0-9][0-9][0-9][0-9]-*.md"))
          adr_catalog = (root / "docs/adr/README.md").read_text(encoding="utf-8")
          adr_index = (root / "docs/traceability/adr-index.md").read_text(encoding="utf-8")

          for adr in adr_files:
              if adr.name not in adr_catalog:
                  errors.append(f"docs/adr/README.md: ADR missing from catalog: {adr.name}")
              if adr.name not in adr_index:
                  errors.append(f"docs/traceability/adr-index.md: ADR missing from index: {adr.name}")

          puml_files = sorted((root / "docs/uml").rglob("*.puml"))
          if not puml_files:
              errors.append("docs/uml: expected at least one PlantUML diagram")

          for path in puml_files:
              text = path.read_text(encoding="utf-8")
              if text.count("@startuml") != 1 or text.count("@enduml") != 1:
                  errors.append(
                      f"{path.relative_to(root)}: expected exactly one @startuml/@enduml pair"
                  )

          if errors:
              print("\n".join(f"ERROR: {error}" for error in errors))
              sys.exit(1)

          print(
              f"Validated {len(markdown_files)} Markdown files, "
              f"{len(adr_files)} ADRs and {len(puml_files)} PlantUML diagrams."
          )
          PY
